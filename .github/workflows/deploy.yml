# ============================================================
# GitHub Actions — Full CI/CD Pipeline
# Builds Docker image → Pushes to ECR → Deploys via Terraform
# AWS Academy Compatible (uses session token)
# ============================================================

name: Deploy to AWS ECS

on:
  push:
    branches:
      - main   # Triggers on every push to main branch

env:
  AWS_REGION:    us-east-1
  APP_NAME:      devops-static-app
  TF_VERSION:    1.14.8
  TF_IN_AUTOMATION: true
  TF_VAR_subnet_id: ${{ secrets.AWS_SUBNET_ID }}
  TF_VAR_security_group_id: ${{ secrets.AWS_SECURITY_GROUP_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ──────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Configure AWS credentials (Academy = 3 keys) ──
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Step 3: Validate required deployment secrets ─────────
      - name: Validate Required Secrets
        run: |
          test -n "${{ env.TF_VAR_subnet_id }}" || (echo "❌ Missing secret: AWS_SUBNET_ID" && exit 1)
          test -n "${{ env.TF_VAR_security_group_id }}" || (echo "❌ Missing secret: AWS_SECURITY_GROUP_ID" && exit 1)

      # ── Step 4: Login to Amazon ECR ───────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Step 5: Ensure ECR repository exists ───────────────
      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names "${{ env.APP_NAME }}" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.APP_NAME }}" --region "${{ env.AWS_REGION }}"

      # ── Step 6: Build, Tag & Push Docker Image ─────────────
      - name: Build, Tag & Push Docker Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG
          LATEST_URI=$ECR_REGISTRY/${{ env.APP_NAME }}:latest

          echo "Building Docker image..."
          docker build -t $IMAGE_URI -t $LATEST_URI .

          echo "Pushing image to ECR..."
          docker push $IMAGE_URI
          docker push $LATEST_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Docker image pushed: $IMAGE_URI"

      # ── Step 7: Setup Terraform ───────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Step 8: Terraform Version Check ──────────────────
      - name: Terraform Version Check
        run: terraform version

      # ── Step 9: Terraform Fmt Check ───────────────────────
      - name: Terraform Fmt Check
        run: |
          terraform fmt -check -recursive
          echo "✅ Terraform formatting is valid"

      # ── Step 10: Terraform Init ───────────────────────────
      - name: Terraform Init
        run: |
          terraform init -upgrade -input=false || (rm -rf .terraform .terraform.lock.hcl && terraform init -upgrade -input=false)
          echo "✅ Terraform initialized"

      # ── Step 11: Terraform Import Existing ECR ────────────
      - name: Terraform Import Existing ECR
        run: |
          terraform import -input=false aws_ecr_repository.app_repo "${{ env.APP_NAME }}" || true
          echo "✅ Existing ECR repository imported if present"

      # ── Step 12: Terraform Validate ───────────────────────
      - name: Terraform Validate
        run: |
          terraform validate
          echo "✅ Terraform configuration is valid"

      # ── Step 13: Terraform Plan ───────────────────────────
      - name: Terraform Plan
        run: |
          terraform plan -input=false -out=tfplan
          echo "✅ Terraform plan complete"

      # ── Step 14: Terraform Apply ──────────────────────────
      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve tfplan
          echo "✅ Infrastructure provisioned successfully"

      # ── Step 15: Print Deployment Summary ─────────────────
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "  App Name  : ${{ env.APP_NAME }}"
          echo "  Region    : ${{ env.AWS_REGION }}"
          echo "  Image     : ${{ steps.build-image.outputs.image }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "============================================"
          echo ""
          echo "👉 Go to AWS Console → ECS → Clusters"
          echo "   → devops-static-app-cluster → Tasks"
          echo "   → Copy Public IP → Open in browser :80"