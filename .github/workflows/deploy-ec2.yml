name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check EC2 configuration
        id: ec2-config
        run: |
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_SSH_KEY" ] && [ -n "$EC2_APP_DIR" ]; then
            echo "mode=ssh" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ] && [ -n "$AWS_SESSION_TOKEN" ] && [ -n "$AWS_REGION" ] && [ -n "$EC2_INSTANCE_ID" ] && [ -n "$EC2_APP_DIR" ]; then
            echo "mode=ssm" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ] && [ -n "$AWS_SESSION_TOKEN" ]; then
            echo "mode=aws-credentials-only" >> "$GITHUB_OUTPUT"
            echo "AWS learner credentials found. Add AWS_REGION, EC2_INSTANCE_ID, and EC2_APP_DIR to deploy through SSM."
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "EC2 deployment skipped because deployment secrets are missing."
          fi

      - name: Configure AWS credentials
        if: steps.ec2-config.outputs.mode == 'ssm' || steps.ec2-config.outputs.mode == 'aws-credentials-only'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION || 'us-east-1' }}

      - name: Validate AWS learner credentials
        if: steps.ec2-config.outputs.mode == 'ssm' || steps.ec2-config.outputs.mode == 'aws-credentials-only'
        run: aws sts get-caller-identity

      - name: Deploy over AWS SSM
        if: steps.ec2-config.outputs.mode == 'ssm'
        run: |
          set -e
          command_id=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Carlo from GitHub Actions" \
            --parameters commands="[
              \"set -e\",
              \"mkdir -p '$EC2_APP_DIR'\",
              \"if [ ! -d '$EC2_APP_DIR/.git' ]; then git clone '${{ github.server_url }}/${{ github.repository }}.git' '$EC2_APP_DIR'; fi\",
              \"cd '$EC2_APP_DIR'\",
              \"git fetch origin main\",
              \"git reset --hard origin/main\",
              \"chmod +x scripts/deploy-ec2.sh\",
              \"./scripts/deploy-ec2.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "$command_id" --instance-id "$EC2_INSTANCE_ID"
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$EC2_INSTANCE_ID"

      - name: Deploy over SSH
        if: steps.ec2-config.outputs.mode == 'ssh'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ env.EC2_APP_DIR }}"
            if [ ! -d "${{ env.EC2_APP_DIR }}/.git" ]; then
              git clone "${{ github.server_url }}/${{ github.repository }}.git" "${{ env.EC2_APP_DIR }}"
            fi
            cd "${{ env.EC2_APP_DIR }}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-ec2.sh
            ./scripts/deploy-ec2.sh
