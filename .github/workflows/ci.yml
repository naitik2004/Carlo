name: CI

on:
  push:
  pull_request:

jobs:
  phase-1-install:
    name: Phase 1 - Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

  phase-2-lint:
    name: Phase 2 - Lint Checks
    runs-on: ubuntu-latest
    needs: phase-1-install

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Run backend lint
        run: npm run lint
        working-directory: backend

  phase-3-unit-tests:
    name: Phase 3 - Unit Tests
    runs-on: ubuntu-latest
    needs: phase-2-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run frontend unit tests
        run: npm test
        working-directory: frontend

      - name: Run backend unit tests
        run: npm run test:unit
        working-directory: backend
        env:
          JWT_SECRET: test-secret

  phase-4-integration-tests:
    name: Phase 4 - Integration Tests
    runs-on: ubuntu-latest
    needs: phase-3-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend integration tests
        run: npm run test:integration
        working-directory: backend
        env:
          JWT_SECRET: test-secret

  phase-5-build:
    name: Phase 5 - Build Frontend
    runs-on: ubuntu-latest
    needs: phase-4-integration-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  phase-6-e2e:
    name: Phase 6 - E2E Smoke Test
    runs-on: ubuntu-latest
    needs: phase-5-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Run Playwright E2E smoke test
        run: npm run e2e
        working-directory: frontend

  phase-7-deploy-readiness:
    name: Phase 7 - Deployment Readiness
    runs-on: ubuntu-latest
    needs: phase-6-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm deploy files exist
        run: |
          test -f .github/workflows/deploy-ec2.yml
          test -x scripts/deploy-ec2.sh

      - name: Confirm Dependabot config exists
        run: test -f .github/dependabot.yml
