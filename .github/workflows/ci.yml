name: CI-CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phase-1-testing:
    name: Phase 1 - Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Run backend lint
        run: npm run lint
        working-directory: backend

      - name: Prepare test reports directory
        run: mkdir -p test-reports

      - name: Frontend unit tests
        run: |
          node --test --test-reporter=junit --test-reporter-destination=../test-reports/frontend-unit.xml "src/**/*.test.js"
        working-directory: frontend

      - name: Backend unit tests
        run: |
          node --test --test-reporter=junit --test-reporter-destination=../test-reports/backend-unit.xml src/middleware/auth.test.js
        working-directory: backend
        env:
          JWT_SECRET: test-secret

      - name: Backend integration tests
        run: |
          node --test --test-reporter=junit --test-reporter-destination=../test-reports/backend-integration.xml src/routes/cars.test.js
        working-directory: backend
        env:
          JWT_SECRET: test-secret

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Run E2E smoke test
        run: npm run e2e
        working-directory: frontend

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test-reports/

  phase-2-terraform-validate:
    name: Phase 2 - Infrastructure Provisioning (Terraform Validate)
    runs-on: ubuntu-latest
    needs: phase-1-testing

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  phase-2-terraform-plan:
    name: Phase 2 - Infrastructure Provisioning (Terraform Plan)
    runs-on: ubuntu-latest
    needs: phase-2-terraform-validate

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET_DEPLOY: ${{ secrets.JWT_SECRET }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket (main branch only)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="carlo-tfstate-${ACCOUNT_ID}"
          echo "TF_STATE_BUCKET=${BUCKET}" >> "$GITHUB_ENV"
          if aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists."
          else
            aws s3 mb "s3://${BUCKET}" --region "${AWS_REGION}"
            aws s3api put-bucket-versioning --bucket "${BUCKET}" --versioning-configuration Status=Enabled
            aws s3api put-public-access-block --bucket "${BUCKET}" --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuc kets=true || true
            aws s3api put-bucket-encryption --bucket "${BUCKET}" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' || true
          fi

      - name: Terraform init
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            terraform init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=carlo/terraform.tfstate" \
              -backend-config="region=${AWS_REGION}" \
              -backend-config="encrypt=true"
          else
            terraform init -backend=false -input=false
          fi

      - name: Terraform plan
        run: |
          set -euo pipefail
          if [ -n "${MONGO_URI:-}" ]; then export TF_VAR_mongo_uri="$MONGO_URI"; fi
          if [ -n "${JWT_SECRET_DEPLOY:-}" ]; then export TF_VAR_jwt_secret="$JWT_SECRET_DEPLOY"; fi
          terraform plan -input=false -out=tfplan

      - name: Save plan report
        run: terraform show -no-color tfplan > terraform-plan.txt

      - name: Upload plan report
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/terraform-plan.txt

  phase-2-terraform-apply:
    name: Phase 2 - Infrastructure Provisioning (Terraform Apply)
    runs-on: ubuntu-latest
    needs: phase-2-terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET_DEPLOY: ${{ secrets.JWT_SECRET }}
      ECS_EXECUTION_ROLE_ARN: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
      ECS_TASK_ROLE_ARN: ${{ secrets.ECS_TASK_ROLE_ARN }}

    defaults:
      run:
        working-directory: terraform

    outputs:
      ecr_repository_url: ${{ steps.tf.outputs.ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf.outputs.ecs_service_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="carlo-tfstate-${ACCOUNT_ID}"
          echo "TF_STATE_BUCKET=${BUCKET}" >> "$GITHUB_ENV"
          echo "ACCOUNT_ID=${ACCOUNT_ID}" >> "$GITHUB_ENV"

      - name: Discover existing ECS roles
        shell: bash
        run: |
          set -euo pipefail
          ACCOUNT_ID="${ACCOUNT_ID}"
          REGION="${AWS_REGION}"
          
          # Use AWS Academy LabRole instead of ecsTaskExecutionRole
          EXEC_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/LabRole"
          echo "Using assumed ECS execution role: $EXEC_ROLE_ARN"
          echo "ECS_EXECUTION_ROLE_ARN=$EXEC_ROLE_ARN" >> "$GITHUB_ENV"

      - name: Terraform init with remote state
        run: |
          set -euo pipefail
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=carlo/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            
            -backend-config="encrypt=true"


      - name: Terraform apply
        run: |
          set -euo pipefail
          if [ -n "${MONGO_URI:-}" ]; then export TF_VAR_mongo_uri="$MONGO_URI"; fi
          if [ -n "${JWT_SECRET_DEPLOY:-}" ]; then export TF_VAR_jwt_secret="$JWT_SECRET_DEPLOY"; fi
          if [ -n "${ECS_EXECUTION_ROLE_ARN:-}" ]; then export TF_VAR_existing_ecs_execution_role_arn="$ECS_EXECUTION_ROLE_ARN"; fi
          if [ -n "${ECS_TASK_ROLE_ARN:-}" ]; then export TF_VAR_existing_ecs_task_role_arn="$ECS_TASK_ROLE_ARN"; fi
          terraform plan -input=false -out=tfplan
          terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        id: tf
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"

  phase-3-docker-build:
    name: Phase 3 - Container Build (Docker)
    runs-on: ubuntu-latest
    needs: phase-2-terraform-apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t carlo-backend:ci .

  phase-3-push-ecr:
    name: Phase 3 - Push Image to ECR
    runs-on: ubuntu-latest
    needs:
      - phase-2-terraform-apply
      - phase-3-docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_URL: ${{ needs.phase-2-terraform-apply.outputs.ecr_repository_url }}
        run: |
          set -euo pipefail
          if [ -z "${ECR_URL:-}" ]; then
            echo "ECR_URL is empty. This means phase-2-terraform-apply did not return an ECR repository URL." >&2
            exit 1
          fi
          echo "ECR_URL=$ECR_URL"
          docker build -t "$ECR_URL:latest" -t "$ECR_URL:${GITHUB_SHA}" .
          docker push "$ECR_URL:latest"
          docker push "$ECR_URL:${GITHUB_SHA}"

  phase-3-deploy-ecs:
    name: Phase 3 - Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs:
      - phase-2-terraform-apply
      - phase-3-push-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy ECS service
        env:
          CLUSTER: ${{ needs.phase-2-terraform-apply.outputs.ecs_cluster_name }}
          SERVICE: ${{ needs.phase-2-terraform-apply.outputs.ecs_service_name }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --desired-count 1 \
            --force-new-deployment

      - name: Wait for ECS service stability
        env:
          CLUSTER: ${{ needs.phase-2-terraform-apply.outputs.ecs_cluster_name }}
          SERVICE: ${{ needs.phase-2-terraform-apply.outputs.ecs_service_name }}
        run: aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

  phase-3-verify-service:
    name: Phase 3 - Verify Service Running
    runs-on: ubuntu-latest
    needs:
      - phase-2-terraform-apply
      - phase-3-deploy-ecs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm ECS service is running
        env:
          CLUSTER: ${{ needs.phase-2-terraform-apply.outputs.ecs_cluster_name }}
          SERVICE: ${{ needs.phase-2-terraform-apply.outputs.ecs_service_name }}
        run: |
          set -euo pipefail
          RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].runningCount" --output text)
          DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].desiredCount" --output text)
          echo "running=$RUNNING desired=$DESIRED"
          test "$RUNNING" = "$DESIRED"
          test "$RUNNING" != "0"
